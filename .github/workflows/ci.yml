# .github/workflows/ci.yml
#
# CI Kinetic — GitHub Actions
#
# Déclenché sur :
#   - push vers main / develop
#   - Pull Request vers main

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION:  '20'
  PNPM_VERSION:  '9'

jobs:

  # ─── 1. TypeScript ──────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages/core
        run: pnpm --filter @kinetic/core build

      - name: Build packages/adapters-web
        run: pnpm --filter @kinetic/adapters-web build

      - run: pnpm typecheck

  # ─── 2. Tests unitaires ─────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages/core
        run: pnpm --filter @kinetic/core build

      - name: Build packages/adapters-web
        run: pnpm --filter @kinetic/adapters-web build

      - name: Run Vitest with coverage
        run: pnpm coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: tests/coverage/
          retention-days: 7

      - name: Coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          json-summary-path: tests/coverage/coverage-summary.json
          json-final-path: tests/coverage/coverage-final.json

  # ─── 3. Tests E2E ───────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages/core
        run: pnpm --filter @kinetic/core build

      - name: Build packages/adapters-web
        run: pnpm --filter @kinetic/adapters-web build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app (needed for E2E)
        run: pnpm build
        env:
          VITE_SUPABASE_URL:      ''
          VITE_SUPABASE_ANON_KEY: ''

      - name: Run E2E tests
        run: pnpm e2e --project=mobile-chrome
        env:
          CI: true

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/report/
          retention-days: 7

  # ─── 4. Build production ────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages/core
        run: pnpm --filter @kinetic/core build

      - name: Build packages/adapters-web
        run: pnpm --filter @kinetic/adapters-web build

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_VERSION:        ${{ github.sha }}

      - name: Check bundle size
        run: |
          du -sh apps/web/dist/
          find apps/web/dist/static -name "*.js" | xargs ls -la | sort -k5 -rn | head -10

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/web/dist/
          retention-days: 3

  # ─── 5. Lighthouse (PR only) ────────────────────────────────
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: apps/web/dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
