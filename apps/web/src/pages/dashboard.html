<div x-data="dashboard()" x-init="init()" class="max-w-md mx-auto px-4 pt-8 pb-8">

  <!-- En-tête -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-white" x-text="greeting"></h1>
      <p class="text-sm text-gray-500" x-text="todayLabel"></p>
    </div>
    <div class="w-10 h-10 rounded-full bg-kinetic-purple flex items-center
                justify-center text-white font-bold text-sm select-none"
         x-text="$store.auth.initials"></div>
  </div>

  <!-- XP Bar -->
  <div class="bg-gray-800 rounded-2xl p-4 mb-4 shadow-sm">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-500">Niveau</span>
        <span class="font-black text-kinetic-purple text-lg leading-none"
              x-text="$store.xp.currentLevel"></span>
        <span class="text-xs text-gray-400 font-medium" x-text="$store.xp.title"></span>
      </div>
      <span class="text-sm font-mono font-bold text-white"
            x-text="$store.xp.xp + ' XP'"></span>
    </div>
    <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
      <div class="h-full bg-gradient-to-r from-kinetic-purple to-violet-400
                  rounded-full transition-all duration-700 ease-out"
           :style="`width: ${$store.xp.progressPercent}%`"></div>
    </div>
    <div class="flex justify-between mt-1.5">
      <p class="text-xs text-gray-600" x-text="`Niveau ${$store.xp.currentLevel}`"></p>
      <p class="text-xs text-gray-500"
         x-show="!$store.xp.isMaxLevel"
         x-text="`${$store.xp.remaining} XP pour niveau ${$store.xp.currentLevel + 1}`"></p>
      <p class="text-xs text-kinetic-gold font-medium"
         x-show="$store.xp.isMaxLevel">🏆 MAX</p>
    </div>
  </div>

  <!-- Routine vitalité -->
  <div class="bg-gray-800 rounded-2xl p-4 mb-4 shadow-sm">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-semibold text-white">Routine vitalité</h2>
      <span class="text-xs bg-kinetic-teal/10 text-kinetic-teal px-2 py-0.5 rounded-full font-medium"
            x-text="`${$store.vitalite.doneCount}/${$store.vitalite.totalCount}`"></span>
    </div>
    <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden mb-3">
      <div class="h-full bg-kinetic-teal rounded-full transition-all duration-500"
           :style="`width: ${$store.vitalite.progress}%`"></div>
    </div>

    <div x-show="$store.vitalite.allDone"
         x-transition
         class="text-center py-2 text-kinetic-teal font-medium text-sm">
      ✅ Routine complète — excellent travail !
    </div>

    <a href="#/vitalite"
       x-show="!$store.vitalite.allDone"
       class="block text-center py-2 text-sm text-kinetic-purple hover:text-purple-400
              transition-colors font-medium">
      Continuer la routine →
    </a>
  </div>

  <!-- Stats rapides -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <!-- Streak -->
    <div class="bg-gradient-to-br from-kinetic-coral/80 to-orange-500/80
                rounded-2xl p-4 text-white">
      <p class="text-white/70 text-xs mb-1">Streak actuel</p>
      <p class="text-3xl font-black" x-text="streak + ' 🔥'"></p>
    </div>

    <!-- Record -->
    <div class="bg-gray-800 rounded-2xl p-4">
      <p class="text-gray-500 text-xs mb-1">Meilleur streak</p>
      <p class="text-3xl font-black text-kinetic-gold" x-text="bestStreak + ' ⭐'"></p>
    </div>
  </div>

  <!-- Activité récente -->
  <div class="bg-gray-800 rounded-2xl p-4">
    <h2 class="font-semibold text-white mb-3">Activité</h2>
    <div class="flex gap-1.5">
      <template x-for="(day, i) in activityDays" :key="i">
        <div class="flex-1 flex flex-col items-center gap-1">
          <div class="w-full h-6 rounded-md transition-colors"
               :class="day.active ? 'bg-kinetic-purple' : 'bg-gray-700'"
               :title="day.label"></div>
          <span class="text-xs text-gray-600" x-text="day.short"></span>
        </div>
      </template>
    </div>
  </div>

</div>

<!-- Level-up overlay -->
<div x-data="{ show: false, level: 0, title: '' }"
     @kinetic:levelup.window="level = $event.detail.level; title = $event.detail.title; show = true; setTimeout(() => show = false, 3000)"
     x-show="show"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 scale-90"
     x-transition:enter-end="opacity-100 scale-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 scale-100"
     x-transition:leave-end="opacity-0 scale-90"
     class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
  <div class="bg-gradient-to-br from-kinetic-purple to-violet-600 text-white
              rounded-3xl p-8 text-center shadow-2xl max-w-xs mx-4">
    <p class="text-5xl mb-3">🎉</p>
    <p class="text-2xl font-black">Niveau <span x-text="level"></span> !</p>
    <p class="text-white/80 mt-1" x-text="title"></p>
  </div>
</div>

<script>
function dashboard() {
  return {
    greeting:     '',
    todayLabel:   '',
    streak:       0,
    bestStreak:   0,
    activityDays: [],

    async init() {
      const hour = new Date().getHours();
      this.greeting = hour < 12 ? 'Bonjour 👋' : hour < 18 ? 'Bon après-midi 🌤️' : 'Bonsoir 🌙';
      this.todayLabel = new Date().toLocaleDateString('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long',
      });

      // Charger streak
      const { getDeps } = await import('/src/deps.js');
      const deps = await getDeps();
      const streakData = await deps.storage.get('kinetic:streak');
      if (streakData && typeof streakData === 'object') {
        this.streak     = streakData.count ?? 0;
        this.bestStreak = streakData.best  ?? 0;
      }

      // Construire les 7 derniers jours d'activité
      this.activityDays = await this._buildActivityDays(deps);
    },

    async _buildActivityDays(deps) {
      const days   = [];
      const jours  = ['D', 'L', 'M', 'M', 'J', 'V', 'S'];
      const today  = new Date();

      for (let i = 6; i >= 0; i--) {
        const d    = new Date(today);
        d.setDate(d.getDate() - i);
        const iso  = d.toISOString().slice(0, 10);
        const done = await deps.storage.get(`kinetic:vitalite:done:${iso}`);
        days.push({
          label:  iso,
          short:  jours[d.getDay()] ?? '',
          active: Array.isArray(done) && done.length > 0,
        });
      }
      return days;
    },
  };
}
</script>
