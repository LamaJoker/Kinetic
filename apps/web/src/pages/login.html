<div class="min-h-screen flex items-center justify-center px-4 bg-gray-950"
     x-data="{ emailMode: false }">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 mx-auto bg-kinetic-purple rounded-2xl flex items-center
                  justify-center mb-4 shadow-lg shadow-kinetic-purple/30">
        <span class="text-white text-3xl font-black">K</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Kinetic</h1>
      <p class="text-gray-500 text-sm mt-1">Ton système de performance quotidien</p>
    </div>

    <!-- Erreur -->
    <div x-show="$store.auth.error"
         x-transition
         class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"
         x-text="$store.auth.error">
    </div>

    <!-- Magic link envoyé -->
    <div x-show="$store.auth.magicLinkSent"
         x-transition
         class="mb-4 p-5 bg-kinetic-teal/10 border border-kinetic-teal/30 rounded-2xl text-center">
      <p class="text-3xl mb-2">📬</p>
      <p class="font-semibold text-kinetic-teal">Lien envoyé !</p>
      <p class="text-gray-400 text-sm mt-1">Vérifie ta boîte mail pour te connecter.</p>
    </div>

    <!-- Boutons OAuth + Email -->
    <div x-show="!$store.auth.magicLinkSent" class="space-y-3">

      <!-- GitHub -->
      <button @click="$store.auth.loginWithGitHub()"
              class="w-full flex items-center justify-center gap-3 px-4 py-3.5
                     bg-gray-800 border border-gray-700 text-white rounded-2xl
                     hover:bg-gray-700 transition-colors text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continuer avec GitHub
      </button>

      <!-- Google -->
      <button @click="$store.auth.loginWithGoogle()"
              class="w-full flex items-center justify-center gap-3 px-4 py-3.5
                     bg-white border border-gray-200 text-gray-800 rounded-2xl
                     hover:bg-gray-50 transition-colors text-sm font-medium">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuer avec Google
      </button>

      <!-- Séparateur -->
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-800"></div>
        </div>
        <div class="relative flex justify-center text-xs text-gray-600">
          <span class="bg-gray-950 px-3">ou</span>
        </div>
      </div>

      <!-- Email magic link -->
      <div x-show="!emailMode">
        <button @click="emailMode = true"
                class="w-full px-4 py-3.5 text-gray-400 border border-gray-700 rounded-2xl
                       hover:bg-gray-800/50 transition-colors text-sm">
          Continuer avec email
        </button>
      </div>

      <div x-show="emailMode" class="space-y-2">
        <input type="email"
               x-model="$store.auth.emailInput"
               placeholder="ton@email.com"
               @keydown.enter="$store.auth.loginWithEmail()"
               class="w-full px-4 py-3.5 border border-gray-700 rounded-2xl
                      bg-gray-800 text-white focus:outline-none
                      focus:ring-2 focus:ring-kinetic-purple
                      placeholder-gray-600 text-sm"/>
        <button @click="$store.auth.loginWithEmail()"
                class="w-full px-4 py-3.5 bg-kinetic-purple text-white rounded-2xl
                       hover:bg-purple-700 transition-colors font-medium text-sm">
          Envoyer le lien magique
        </button>
      </div>

    </div>

    <p class="text-center text-xs text-gray-600 mt-8">
      En continuant, tu acceptes les
      <a href="#" class="underline hover:text-gray-400">CGU</a> et la
      <a href="#" class="underline hover:text-gray-400">politique de confidentialité</a>.
    </p>

  </div>
</div>
