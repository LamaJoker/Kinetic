<div class="max-w-md mx-auto px-4 pt-8 pb-8">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <a href="#/" class="text-gray-500 hover:text-gray-300 transition-colors p-1 -ml-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-bold text-white">Routine vitalité</h1>
    <span class="ml-auto text-xs text-gray-500"
          x-text="new Date().toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' })">
    </span>
  </div>

  <!-- Progression globale -->
  <div class="bg-kinetic-teal/10 border border-kinetic-teal/20 rounded-2xl p-4 mb-6">
    <div class="flex items-center justify-between mb-2">
      <span class="text-kinetic-teal font-semibold text-sm">Progression du jour</span>
      <span class="font-black text-kinetic-teal" x-text="$store.vitalite.progress + '%'"></span>
    </div>
    <div class="h-2.5 bg-kinetic-teal/20 rounded-full overflow-hidden">
      <div class="h-full bg-kinetic-teal rounded-full transition-all duration-500 ease-out"
           :style="`width: ${$store.vitalite.progress}%`"></div>
    </div>
    <p class="text-xs text-gray-500 mt-1.5"
       x-text="`${$store.vitalite.doneCount} sur ${$store.vitalite.totalCount} tâches complétées`">
    </p>
  </div>

  <!-- Liste des tâches -->
  <div class="space-y-3" x-data>
    <template x-for="task in $store.vitalite.tasks" :key="task.id">
      <button
        @click="$store.vitalite.complete(task.id)"
        :disabled="task.done || $store.vitalite.completingId === task.id"
        class="w-full flex items-center gap-4 p-4 bg-gray-800 rounded-2xl
               shadow-sm transition-all duration-200 text-left
               hover:shadow-md hover:bg-gray-750
               active:scale-[0.98]
               disabled:opacity-60 disabled:cursor-not-allowed"
        :class="{ 'ring-2 ring-kinetic-teal/40': task.done }">

        <!-- Icône / Checkmark animé -->
        <div class="w-12 h-12 rounded-xl flex items-center justify-center
                    text-2xl flex-shrink-0 transition-colors duration-300"
             :class="task.done ? 'bg-kinetic-teal/15' : 'bg-gray-700'">
          <span x-show="!task.done" x-text="task.icon"></span>
          <span x-show="task.done"
                x-transition:enter="transition duration-300"
                x-transition:enter-start="scale-0 opacity-0"
                x-transition:enter-end="scale-100 opacity-100"
                class="text-kinetic-teal font-bold text-lg">✓</span>
        </div>

        <!-- Contenu -->
        <div class="flex-1 min-w-0">
          <p class="font-medium text-sm transition-colors"
             :class="task.done ? 'line-through text-gray-500' : 'text-white'"
             x-text="task.title"></p>
          <p class="text-xs mt-0.5"
             :class="task.done ? 'text-kinetic-teal' : 'text-gray-500'"
             x-text="task.done ? 'Complété ✓' : '+' + task.xp + ' XP'"></p>
        </div>

        <!-- Badge priorité -->
        <span class="text-xs px-2 py-0.5 rounded-full flex-shrink-0 font-medium"
              :class="{
                'bg-red-500/15 text-red-400':    task.priority === \'high\',
                'bg-amber-500/15 text-amber-400': task.priority === \'med\',
                'bg-gray-700 text-gray-500':      task.priority === \'low\'
              }"
              x-text="{ high: 'Priorité haute', med: 'Moyenne', low: 'Faible' }[task.priority]">
        </span>

        <!-- Spinner chargement -->
        <div x-show="$store.vitalite.completingId === task.id"
             class="w-5 h-5 border-2 border-kinetic-purple border-t-transparent
                    rounded-full animate-spin flex-shrink-0">
        </div>

      </button>
    </template>
  </div>

  <!-- Message victoire -->
  <div x-show="$store.vitalite.allDone"
       x-transition:enter="transition ease-out duration-500"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       class="mt-6 p-6 bg-gradient-to-br from-kinetic-teal to-emerald-500
              rounded-2xl text-white text-center shadow-lg">
    <p class="text-5xl mb-3">🏆</p>
    <p class="font-black text-xl">Routine complète !</p>
    <p class="text-white/80 text-sm mt-2">
      Incroyable. Continue comme ça demain. 🔥
    </p>
    <a href="#/"
       class="mt-4 inline-block px-6 py-2.5 bg-white/20 hover:bg-white/30
              transition-colors rounded-xl text-sm font-semibold">
      Retour au dashboard →
    </a>
  </div>

</div>
