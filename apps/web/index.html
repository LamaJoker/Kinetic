<!DOCTYPE html>
<html lang="fr" class="dark h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#7F77DD"/>
  <meta name="description" content="Kinetic — ton système d'exploitation quotidien pour la performance"/>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kinetic"/>

  <title>Kinetic — Performance OS</title>

  <!-- Tailwind CDN dev (remplacé par build Vite en prod) -->
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script>
    // Config Tailwind
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'kinetic-purple': '#7F77DD',
            'kinetic-teal':   '#00C2A0',
            'kinetic-coral':  '#FF6B6B',
            'kinetic-gold':   '#FFD166',
          },
          scale: { '98': '0.98' },
        },
      },
    };
  </script>

  <style>
    /* Safe area iOS notch */
    body {
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Empêcher scroll bounce iOS */
    html { height: -webkit-fill-available; }
    body { min-height: -webkit-fill-available; }
    /* Désactiver tap highlight iOS */
    * { -webkit-tap-highlight-color: transparent; }
    /* Scrollbar dark */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
  </style>
</head>

<body class="h-full bg-gray-950 text-gray-100 antialiased"
      x-data
      x-init="
        $store.auth.init();
        $store.notifications.init();
        $store.xp.init();
        $store.vitalite.init();
      ">

  <!-- ══ Toast notifications ══════════════════════════════════ -->
  <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-xs w-full">
    <template x-for="toast in $store.notifications.toasts" :key="toast.id">
      <div class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl text-white
                  shadow-xl text-sm transition-all duration-300"
           :class="[
             $store.notifications.kindClass(toast.kind),
             toast.visible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-2'
           ]">
        <span x-text="toast.message" class="flex-1"></span>
        <button @click="$store.notifications.dismiss(toast.id)"
                class="text-white/60 hover:text-white text-xs ml-1">✕</button>
      </div>
    </template>
  </div>

  <!-- ══ Navigation bottom ═════════════════════════════════════ -->
  <nav x-show="$store.auth.isAuthenticated || true"
       class="fixed bottom-0 inset-x-0 bg-gray-900/95 backdrop-blur-md
              border-t border-gray-800 z-40
              pb-[env(safe-area-inset-bottom)]">
    <div class="max-w-md mx-auto flex items-center justify-around px-2 py-2">

      <a href="#/"
         :class="(location.hash === '#/' || location.hash === '') ? 'text-kinetic-purple' : 'text-gray-500'"
         class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl
                transition-colors hover:text-kinetic-purple">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs font-medium">Accueil</span>
      </a>

      <a href="#/vitalite"
         :class="location.hash === '#/vitalite' ? 'text-kinetic-teal' : 'text-gray-500'"
         class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl
                transition-colors hover:text-kinetic-teal">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="text-xs font-medium">Vitalité</span>
      </a>

      <a href="#/profile"
         :class="location.hash === '#/profile' ? 'text-kinetic-purple' : 'text-gray-500'"
         class="flex flex-col items-center gap-1 px-5 py-2 rounded-xl
                transition-colors hover:text-kinetic-purple">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs font-medium">Profil</span>
      </a>

    </div>
  </nav>

  <!-- ══ Outlet de contenu ═════════════════════════════════════ -->
  <main id="app-outlet" class="min-h-screen pb-24">
    <!-- Skeleton initial -->
    <div class="max-w-md mx-auto px-4 pt-8 animate-pulse space-y-4">
      <div class="flex justify-between items-center">
        <div class="space-y-2">
          <div class="h-6 bg-gray-800 rounded w-40"></div>
          <div class="h-4 bg-gray-800 rounded w-32"></div>
        </div>
        <div class="w-10 h-10 bg-gray-800 rounded-full"></div>
      </div>
      <div class="h-20 bg-gray-800 rounded-2xl"></div>
      <div class="h-32 bg-gray-800 rounded-2xl"></div>
      <div class="h-16 bg-gray-800 rounded-2xl"></div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
