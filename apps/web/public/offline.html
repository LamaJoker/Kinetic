<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic — Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7F77DD;
      --bg: #111827;
      --text: #F9FAFB;
      --muted: #6B7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 360px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 1rem;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }

    .btn:hover  { background: #6b63c9; }
    .btn:active { transform: scale(0.97); }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 0.375rem;
      vertical-align: middle;
    }

    .dot.online { background: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📡</span>
    <h1>Connexion perdue</h1>
    <p>
      Pas de panique — tes données sont sauvegardées localement.
      Reconnecte-toi pour synchroniser ta progression.
    </p>

    <button class="btn" onclick="tryReconnect()">Réessayer</button>

    <p class="status" id="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Vérification de la connexion…</span>
    </p>
  </div>

  <script>
    // ─── Surveiller le statut réseau ────────────────────────
    function updateStatus() {
      const dot = document.getElementById('dot');
      const text = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Connexion rétablie — rechargement…';
        setTimeout(() => window.location.href = '/', 800);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Pas de connexion détectée';
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    // ─── Bouton retry ────────────────────────────────────────
    function tryReconnect() {
      const btn = document.querySelector('.btn');
      btn.textContent = 'Vérification…';
      btn.disabled = true;

      // Ping léger
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => {
          btn.textContent = 'Réessayer';
          btn.disabled = false;
          document.getElementById('status-text').textContent = 'Toujours hors ligne';
        });
    }
  </script>
</body>
</html>
